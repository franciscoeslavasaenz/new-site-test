{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<style>
  /* Publications page: section headers larger than paper titles */
  .publications-section-title {
    font-size: 1.8em;
    margin-top: 2.5em;
    margin-bottom: 0.6em;
    padding-bottom: 0.2em;
    border-bottom: 2px solid currentColor;
  }
  /* Paper titles in the listing */
  .archive__item-title {
    font-size: 1.15em;
    margin-top: 1.2em;
    margin-bottom: 0.2em;
  }
  /* Small italic note next to titles (e.g. "(draft available)") */
  .archive__item-note {
    font-size: 0.75em;
    font-weight: normal;
    opacity: 0.7;
    margin-left: 0.4em;
  }
  /* Smaller abstracts */
  .archive__item-excerpt {
    font-size: 0.85em;
    line-height: 1.5;
  }
</style>
